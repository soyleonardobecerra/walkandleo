<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Familiar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --neon:    #00ffcc;
            --neon2:   #00c9ff;
            --bg:      #0d0f12;
            --surface: #161a1f;
            --surface2:#1e2530;
            --text:    #c8d8e8;
            --muted:   #5a7080;
            --danger:  #ff4444;
            --border:  #1e3040;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── PANTALLA DE LOGIN ── */
        #screen-login {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            gap: 24px;
        }
        .login-logo {
            font-family: 'Share Tech Mono', monospace;
            font-size: 28px;
            color: var(--neon);
            letter-spacing: 6px;
            text-align: center;
        }
        .login-sub {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .login-form {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .login-form input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-form input:focus { border-color: var(--neon); }
        .login-form input::placeholder { color: var(--muted); }
        .btn-login {
            width: 100%;
            background: var(--neon);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.85; }
        .login-error {
            font-size: 13px;
            color: var(--danger);
            text-align: center;
            min-height: 18px;
            letter-spacing: 1px;
        }

        /* ── APP PRINCIPAL ── */
        #screen-app {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        #screen-app.visible { display: flex; }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--neon);
            letter-spacing: 3px;
        }
        .header-right { display: flex; align-items: center; gap: 14px; }
        .signal-bars { display: flex; gap: 3px; align-items: flex-end; }
        .signal-bars span {
            width: 4px; border-radius: 2px;
            background: var(--neon); opacity: 0.25;
        }
        .signal-bars span.on { opacity: 1; }
        .signal-bars span:nth-child(1) { height: 6px; }
        .signal-bars span:nth-child(2) { height: 10px; }
        .signal-bars span:nth-child(3) { height: 14px; }
        .signal-bars span:nth-child(4) { height: 18px; }
        .user-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }
        .btn-logout {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            padding: 4px 8px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* ── TABS ── */
        .tabs {
            background: var(--surface);
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab.active { color: var(--neon); border-bottom-color: var(--neon); }

        /* ── PANEL RADIO ── */
        #panel-radio {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .msg {
            background: var(--surface2);
            border-left: 3px solid var(--neon);
            border-radius: 0 8px 8px 0;
            padding: 10px 14px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 85%;
            animation: slide-in 0.25s ease;
            cursor: pointer;
        }
        .msg.own {
            align-self: flex-end;
            flex-direction: row-reverse;
            border-left: none;
            border-right: 3px solid var(--neon2);
            border-radius: 8px 0 0 8px;
        }
        .msg-icon { font-size: 18px; flex-shrink: 0; }
        .msg-body { flex: 1; min-width: 0; }
        .msg-sender { font-size: 11px; color: var(--neon); letter-spacing: 1px; margin-bottom: 2px; }
        .msg.own .msg-sender { color: var(--neon2); text-align: right; }
        .msg-label { font-size: 13px; }
        .msg-time {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin-top: 3px;
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: none; }
        }
        .msg.own { animation-name: slide-in-r; }
        @keyframes slide-in-r {
            from { opacity: 0; transform: translateX(8px); }
            to   { opacity: 1; transform: none; }
        }
        #status {
            background: var(--surface);
            padding: 7px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            text-align: center;
            border-top: 1px solid var(--border);
            transition: color 0.2s;
            flex-shrink: 0;
        }
        #status.recording { color: var(--danger); }
        #status.sending   { color: var(--neon); }

        .controls {
            background: var(--surface);
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .wave { display: flex; gap: 3px; align-items: center; height: 24px; }
        .wave-bar {
            width: 3px; border-radius: 2px;
            background: var(--neon); opacity: 0;
            transition: opacity 0.2s;
        }
        .wave-bar:nth-child(1){height:8px; animation:wave 0.7s 0.0s infinite;}
        .wave-bar:nth-child(2){height:16px;animation:wave 0.7s 0.1s infinite;}
        .wave-bar:nth-child(3){height:24px;animation:wave 0.7s 0.2s infinite;}
        .wave-bar:nth-child(4){height:16px;animation:wave 0.7s 0.1s infinite;}
        .wave-bar:nth-child(5){height:8px; animation:wave 0.7s 0.0s infinite;}
        .wave.active .wave-bar { opacity: 1; }
        @keyframes wave { 0%,100%{transform:scaleY(0.35)} 50%{transform:scaleY(1)} }

        #btn-ptt {
            width: 84px; height: 84px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            background: transparent;
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-ptt::before {
            content:'';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px solid var(--neon);
            opacity: 0.15;
        }
        #btn-ptt.active {
            background: var(--neon);
            color: var(--bg);
            box-shadow: 0 0 0 8px rgba(0,255,204,0.12);
        }
        #btn-ptt.active::before { opacity: 0; }
        .ptt-icon  { font-size: 24px; line-height: 1; }
        .ptt-label { font-size: 9px; letter-spacing: 2px; }

        .online-dots { display: flex; gap: 8px; align-items: center; }
        .dot { width:8px; height:8px; border-radius:50%; background:var(--neon); opacity:0.25; }
        .dot.on { opacity:1; animation:blink 2.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

        /* ── PANEL GPS ── */
        #panel-gps {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
            gap: 12px;
        }
        #panel-gps.visible { display: flex; }
        .gps-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .gps-card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--neon);
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .gps-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 1px;
        }
        .gps-badge.online { background: rgba(0,255,204,0.15); color: var(--neon); }
        .gps-badge.offline { background: rgba(90,112,128,0.2); color: var(--muted); }
        .gps-row {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .gps-row span { color: var(--text); }
        .gps-link {
            display: inline-block;
            margin-top: 10px;
            background: rgba(0,255,204,0.1);
            border: 1px solid rgba(0,255,204,0.3);
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .gps-empty {
            text-align: center;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<!-- PANTALLA LOGIN -->
<div id="screen-login">
    <div>
        <div class="login-logo">📡 RADIO</div>
        <div class="login-sub" style="text-align:center;margin-top:6px;">Familiar</div>
    </div>
    <form class="login-form" id="form-login">
        <input type="email"    id="inp-email" placeholder="Correo electrónico" autocomplete="email">
        <input type="password" id="inp-pass"  placeholder="Contraseña" autocomplete="current-password">
        <button type="submit" class="btn-login">INGRESAR</button>
        <div class="login-error" id="login-error"></div>
    </form>
</div>

<!-- APP PRINCIPAL -->
<div id="screen-app">
    <header>
        <div class="logo">RADIO WT</div>
        <div class="header-right">
            <div class="signal-bars">
                <span class="on"></span><span class="on"></span>
                <span class="on"></span><span></span>
            </div>
            <div class="user-label" id="user-label">—</div>
            <button class="btn-logout" id="btn-logout">SALIR</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" id="tab-radio" onclick="switchTab('radio')">📡 RADIO</div>
        <div class="tab" id="tab-gps"   onclick="switchTab('gps')">📍 UBICACIÓN</div>
    </div>

    <!-- PANEL RADIO -->
    <div id="panel-radio">
        <div id="chat"></div>
        <div id="status">LISTO PARA TRANSMITIR</div>
        <div class="controls">
            <div class="wave" id="wave">
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <button id="btn-ptt">
                <span class="ptt-icon">📡</span>
                <span class="ptt-label" id="ptt-label">PULSA</span>
            </button>
            <div class="online-dots" id="online-dots">
                <div class="dot on"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- PANEL GPS -->
    <div id="panel-gps">
        <div class="gps-empty" id="gps-empty">Cargando ubicaciones...</div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
